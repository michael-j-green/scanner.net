services:
  scanner-net:
    build:
      context: .
      dockerfile: Dockerfile
    image: scanner-net:latest
    container_name: scanner-net
    restart: unless-stopped
    privileged: true
    ports:
      - "54925:54925/udp"
    environment:
      SCANNER_IP: "10.0.0.9"
      ADVERTISE_IP: "10.0.0.200"
      BIND_IP: "0.0.0.0"
      BIND_PORT: "54925"
      CONFIG_INTERVAL_SECONDS: "600"
      OUTPUT_DIR: "/output/scan"
      TEMP_DIR: "/tmp/scan"
      FLATBED_RESOLUTION: "300"
      ADF_RESOLUTION: "300"
    volumes:
      - ./output:/output/scan
      - ./src/scanner.net/appsettings.json:/app/appsettings.json:ro
    healthcheck:
      test: ["CMD-SHELL", "pidof scanner-net >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
