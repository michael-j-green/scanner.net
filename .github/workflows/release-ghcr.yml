name: Release Publish GHCR

on:
  release:
    types: [released, prereleased]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          raw="${{ github.event.release.name }}"
          if [[ -z "$raw" ]]; then
            raw="${{ github.event.release.tag_name }}"
          fi

          if [[ ! "$raw" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(\.[A-Za-z0-9][A-Za-z0-9.-]*)?$ ]]; then
            echo "Release name/tag must be like v1.0.0 or v1.0.0.a"
            exit 1
          fi

          base="${raw#v}"
          prerelease=false
          semver="$base"
          if [[ "$base" =~ ^([0-9]+\.[0-9]+\.[0-9]+)\.(.+)$ ]]; then
            semver="${BASH_REMATCH[1]}-${BASH_REMATCH[2]}"
            prerelease=true
          fi

          image="${{ env.REGISTRY }}/${{ github.repository }}"
          image="${image,,}"

          echo "raw=$raw" >> "$GITHUB_OUTPUT"
          echo "semver=$semver" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.version.outputs.image }}
          tags: |
            type=raw,value=${{ steps.version.outputs.raw }}
            type=raw,value=${{ steps.version.outputs.semver }}
            type=raw,value=latest,enable=${{ steps.version.outputs.prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=scanner.net
            org.opencontainers.image.version=${{ steps.version.outputs.raw }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.version.outputs.semver }}
            APP_VERSION_RAW=${{ steps.version.outputs.raw }}
